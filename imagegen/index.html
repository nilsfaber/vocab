<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Imagen</title>
<link rel="stylesheet" href="/docs/vocab.css">
</head>
<body>

<!-- Sidebar -->
<nav id="sidebar">
  <div id="panel-words">
    <div id="word-list"></div>
    <div id="search-wrap">
      <svg class="icon search-icon"><use href="/docs/icons.svg#icon-search"/></svg>
      <input id="search" type="search" placeholder="Search…" autocomplete="off">
    </div>
    <select id="sort-by" title="Sort order">
      <option value="alpha">A – Z</option>
      <option value="date">Date added</option>
      <option value="occurrences">Occurrences</option>
      <option value="score">Score</option>
    </select>
    <button id="add-word-btn">
      <svg class="icon"><use href="/docs/icons.svg#icon-plus"/></svg> Add word
    </button>
  </div>
</nav>

<!-- Bottom bar -->
<div id="panel-controls">
  <div id="context-row">
    <div id="ctx-game" class="ctx-panel">
      <span id="pool-label"></span>
      Score: <strong id="game-score">0</strong> / <strong id="game-attempts">0</strong>
    </div>
    <div id="ctx-gallery" class="ctx-panel active">
      <svg class="icon"><use href="/docs/icons.svg#icon-columns"/></svg>
      <input id="cols-slider" type="range" min="1" max="8" step="1" value="4" title="Gallery columns">
      <span id="cols-label">4</span>
    </div>
    <div id="ctx-word" class="ctx-panel">
      <span id="queue-indicator">
        <svg class="icon"><use href="/docs/icons.svg#icon-loader"/></svg>
        <span id="queue-count">0</span> queued
      </span>
    </div>
  </div>
  <div id="control-row">
    <button id="ui-toggle" title="Toggle UI">
      <svg class="icon icon-lg"><use href="/docs/icons.svg#icon-eye"/></svg>
    </button>
    <div id="view-pill">
      <button class="pill-btn" id="pill-game" title="Game mode">
        <svg class="icon icon-lg"><use href="/docs/icons.svg#icon-zap"/></svg>
      </button>
      <button class="pill-btn active" id="pill-gallery" title="Gallery">
        <svg class="icon icon-lg"><use href="/docs/icons.svg#icon-grid"/></svg>
      </button>
      <button class="pill-btn" id="pill-word" title="Word view" disabled>
        <svg class="icon icon-lg"><use href="/docs/icons.svg#icon-book"/></svg>
      </button>
    </div>
  </div>
</div>

<!-- Main -->
<main id="main">
  <div id="error-msg">Could not load vocab. Is the server running? <code>python server.py</code></div>

  <!-- Gallery -->
  <div id="gallery"></div>

  <!-- Game view -->
  <div id="game-view">
    <div id="quick-add-panel">
      <input id="quick-add-input" type="text" placeholder="New word…" autocomplete="off" spellcheck="false">
      <button id="quick-add-submit">
        <svg class="icon"><use href="/docs/icons.svg#icon-plus"/></svg>
      </button>
    </div>
    <div class="game-inner">
      <div class="clue-card">
        <div class="clue-label-row">
          <span id="clue-label">What word fits here?</span>
        </div>
        <div id="clue-text"></div>
        <div class="clue-card-footer">
          <div id="clue-source"></div>
          <div id="clue-solved-actions"></div>
        </div>
      </div>
      <div class="game-choices" id="game-choices"></div>
      <button id="game-next-btn">Skip →</button>
    </div>
  </div>

  <!-- Word view -->
  <div id="word-view">
    <div id="new-word-bar">
      <input id="new-word-input" type="text" placeholder="Enter new word…" autocomplete="off" spellcheck="false">
      <button id="create-word-btn">Create</button>
    </div>
    <div id="main-image-wrap">
      <img id="main-image" src="" alt="">
    </div>
    <div id="word-info-panel">
      <div id="word-info-left">
        <div id="word-title-bar">
          <div id="word-title"></div>
          <button id="flag-btn" class="icon-action-btn" title="Flag for regeneration">
            <svg class="icon"><use href="/docs/icons.svg#icon-flag"/></svg>
          </button>
          <button id="delete-word-btn" class="icon-action-btn delete-btn" title="Delete word">
            <svg class="icon"><use href="/docs/icons.svg#icon-trash"/></svg>
          </button>
          <button id="def-save-btn" class="pencil-btn" title="Edit definition">
            <svg class="icon"><use href="/docs/icons.svg#icon-pencil"/></svg>
          </button>
        </div>
        <textarea id="def-edit" spellcheck="false" placeholder="No definition…" rows="3" readonly></textarea>
      </div>
      <div id="word-info-right">
        <div class="info-row">
          <span class="info-row-label">Dutch</span>
          <input id="trans-edit" type="text" spellcheck="false" placeholder="—" readonly>
        </div>
        <div class="info-row">
          <span class="info-row-label">Synonyms</span>
          <input id="syns-edit" type="text" placeholder="—" spellcheck="false" readonly>
        </div>
        <div class="info-row">
          <span class="info-row-label">Antonyms</span>
          <input id="ants-edit" type="text" placeholder="—" spellcheck="false" readonly>
        </div>
      </div>
    </div>

    <div id="alts-section">
      <div id="alts-grid"></div>
    </div>
    <!-- Run script panel -->
    <div id="run-panel">
      <div id="run-header">
        <button id="run-btn">▶</button>
        <select id="script-select"><option value="">Loading…</option></select>
      </div>
      <span class="prompt-label">Positive — base</span>
      <textarea id="prompt-edit" class="prompt-textarea" spellcheck="false" placeholder="Base prompt (scene + style keywords)"></textarea>
      <span class="prompt-label">Positive — refiner</span>
      <textarea id="refiner-edit" class="prompt-textarea" spellcheck="false" placeholder="Refiner prompt (quality, artist)"></textarea>
      <span class="prompt-label">Negative</span>
      <textarea id="negative-edit" class="prompt-textarea" spellcheck="false" placeholder="Negative prompt"></textarea>
      <div id="run-output"></div>
    </div>
    <div id="occurrences-section" style="display:none">
      <div id="occurrences-heading">Occurrences</div>
      <div id="occurrences-list"></div>
    </div>


  </div>
</main>

<!-- Lightbox -->
<div id="lightbox"><img id="lightbox-img" src="" alt=""></div>

<!-- Confirm delete modal -->
<div id="confirm-modal">
  <div id="confirm-modal-box">
    <div id="confirm-modal-title">Delete word?</div>
    <div id="confirm-modal-body"></div>
    <div id="confirm-modal-actions">
      <button id="confirm-cancel-btn">Cancel</button>
      <button id="confirm-delete-btn">Delete</button>
    </div>
  </div>
</div>

<!-- Unsaved changes modal -->
<div id="unsaved-modal">
  <div id="unsaved-modal-box">
    <div id="unsaved-modal-title">Unsaved changes</div>
    <div id="unsaved-modal-actions">
      <button id="unsaved-cancel-btn">Cancel</button>
      <button id="unsaved-discard-btn">Discard</button>
      <button id="unsaved-save-btn">Save</button>
    </div>
  </div>
</div>

<script src="/docs/vocab.js"></script>
<script>
// ── Imagegen-specific overrides and extensions ────────────────────────────────

// Use local server for all API calls
VOCAB_SERVER = `http://${location.hostname}:8765`;
ICON_BASE    = '/docs/';

// Hi-res image path from imagegen words/ folder
imgPath = (word, filename) => `words/${safeFilename(word)}/${filename}`;

// Always reload from server so imagegen picks up generation results
loadVocab = async function() {
  try {
    const resp = await fetch(`${VOCAB_SERVER}/api/vocab`);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    vocab = await resp.json();
    initAfterVocabLoad();
  } catch (e) {
    document.getElementById('error-msg').style.display = 'block';
    console.error('Failed to load vocab:', e);
  }
};

// ── Queue indicator ───────────────────────────────────────────────────────────
async function updateQueueIndicator() {
  try {
    const res  = await fetch(`${VOCAB_SERVER}/api/queue`);
    const data = await res.json();
    const n = data.pending.length + (data.running ? 1 : 0);
    queueCount.textContent = n;
    queueIndicator.classList.toggle('visible', n > 0);
  } catch {}
}

// ── Script runner ─────────────────────────────────────────────────────────────
const scriptSelect = document.getElementById('script-select');
const runBtn       = document.getElementById('run-btn');
const runOutput    = document.getElementById('run-output');

let runPollTimer = null;
let lastLineCount = 0;
let jobQueue    = [];
let activeJobId = null;
let activeWord  = null;

async function loadScripts() {
  try {
    const res  = await fetch(`${VOCAB_SERVER}/api/scripts`);
    const list = await res.json();
    scriptSelect.innerHTML = list.length
      ? list.map(s => `<option value="${s}">${s.replace('.py', '')}</option>`).join('')
      : '<option value="">No scripts found</option>';
    const saved = localStorage.getItem('imagen_last_script');
    if (saved && list.includes(saved)) scriptSelect.value = saved;
  } catch {
    scriptSelect.innerHTML = '<option value="">Server not running</option>';
  }
}

function addPlaceholderThumb(word, jobId) {
  const sec  = document.getElementById('alts-section');
  const grid = document.getElementById('alts-grid');
  sec.style.display = '';
  const thumb = document.createElement('div');
  thumb.className  = 'alt-thumb generating';
  thumb.dataset.jobId = jobId;
  const label = document.createElement('div');
  label.className  = 'gen-label';
  label.textContent = 'generating…';
  thumb.appendChild(label);
  grid.appendChild(thumb);
}

function removePlaceholderThumb(jobId) {
  document.querySelectorAll(`.alt-thumb.generating[data-job-id="${jobId}"]`).forEach(el => el.remove());
}

function appendLine(text, cls = '') {
  const div = document.createElement('div');
  if (cls) div.className = cls;
  div.textContent = text;
  runOutput.appendChild(div);
  runOutput.scrollTop = runOutput.scrollHeight;
}

runBtn.addEventListener('click', async () => {
  if (!selectedWord || !scriptSelect.value) return;
  const script = scriptSelect.value;
  const word   = selectedWord;
  localStorage.setItem('imagen_last_script', script);
  runOutput.classList.add('visible');

  try {
    const body = { script, words: [word] };
    const base     = document.getElementById('prompt-edit').value.trim();
    const refiner  = document.getElementById('refiner-edit').value.trim();
    const negative = document.getElementById('negative-edit').value.trim();
    if (base)     body.prompt_base    = base;
    if (refiner)  body.prompt_refiner = refiner;
    if (negative) body.negative       = negative;

    const res = await fetch(`${VOCAB_SERVER}/api/run`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    const { job_id, queue_position, error } = await res.json();
    if (error) { appendLine(`Error: ${error}`, 'out-err'); return; }

    if (word === selectedWord) addPlaceholderThumb(word, job_id);
    jobQueue.push({ job_id, word });
    if (queue_position > 0) {
      appendLine(`Queued "${word}" — position ${queue_position + 1} in queue`, 'out-done');
    }
    updateQueueIndicator();
    if (!activeJobId) advanceQueue();
  } catch {
    appendLine('Cannot reach server. Start it with: python server.py', 'out-err');
  }
});

function advanceQueue() {
  if (jobQueue.length === 0) { activeJobId = null; activeWord = null; return; }
  const next = jobQueue.shift();
  activeJobId = next.job_id;
  activeWord  = next.word;
  lastLineCount = 0;
  pollJob(activeJobId);
}

function pollJob(job_id) {
  clearInterval(runPollTimer);
  runPollTimer = setInterval(async () => {
    try {
      const res  = await fetch(`${VOCAB_SERVER}/api/status/${job_id}`);
      const data = await res.json();
      const newLines = data.lines.slice(lastLineCount);
      newLines.forEach(line => {
        const cls = line.startsWith('ERROR') || line.startsWith('error') ? 'out-err'
                  : line.startsWith('  OK') || line.includes('saved →') ? 'out-ok'
                  : '';
        appendLine(line, cls);
      });
      lastLineCount = data.lines.length;

      if (data.done) {
        clearInterval(runPollTimer);
        const ok = data.rc === 0;
        appendLine(ok ? '✓ Done (exit 0)' : `✗ Exited with code ${data.rc}`, ok ? 'out-done' : 'out-err');

        removePlaceholderThumb(job_id);
        if (ok) {
          const resp = await fetch(`${VOCAB_SERVER}/api/vocab`);
          if (resp.ok) {
            vocab = await resp.json();
            if (activeWord && vocab[activeWord]) {
              const imgs = vocab[activeWord].images || [];
              const newest = imgs[imgs.length - 1]?.filename;
              if (newest) vocab[activeWord].default_image = newest;
            }
            if (selectedWord) openWord(selectedWord);
            renderWordList();
          }
        }

        updateQueueIndicator();
        if (jobQueue.length > 0) {
          appendLine(`── Next job (${jobQueue.length} remaining) ──`, 'out-done');
          lastLineCount = 0;
          advanceQueue();
        } else {
          activeJobId = null;
          activeWord  = null;
        }
      }
    } catch {}
  }, 800);
}

// ── Apply image to docs ───────────────────────────────────────────────────────
async function applyToDoc(word, filename, verbose = false) {
  try {
    const res  = await fetch(`${VOCAB_SERVER}/api/apply`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ word, filename }),
    });
    const data = await res.json();
    if (verbose) {
      runOutput.classList.add('visible');
      if (data.error) appendLine(`Apply error: ${data.error}`, 'out-err');
      else appendLine(`✓ ${data.message}`, 'out-ok');
    }
  } catch {
    if (verbose) {
      runOutput.classList.add('visible');
      appendLine('Cannot reach server.', 'out-err');
    }
  }
}

// ── Boot ──────────────────────────────────────────────────────────────────────
loadVocab();
loadScripts();
</script>
</body>
</html>
