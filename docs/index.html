<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0a0a0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Vocab">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.svg">
<title>Vocabulary</title>
<link rel="stylesheet" href="vocab.css">
</head>
<body>

<div id="sync-status"></div>



<!-- Sidebar -->
<nav id="sidebar">
  <div id="panel-words">
    <div id="word-list"></div>
    <div id="search-wrap">
      <svg class="icon search-icon"><use href="icons.svg#icon-search"/></svg>
      <input id="search" type="search" placeholder="Search…" autocomplete="off">
    </div>
    <select id="sort-by" title="Sort order">
      <option value="alpha">A – Z</option>
      <option value="date">Date added</option>
      <option value="occurrences">Occurrences</option>
      <option value="score">Score</option>
    </select>
  </div>
</nav>

<!-- Bottom bar -->
<div id="panel-controls">
  <div id="context-row">
    <div id="ctx-game" class="ctx-panel">
      <select id="game-mode-select" title="Game mode">
        <option value="random">Random</option>
        <option value="context">Context</option>
        <option value="reverse">Definitions</option>
        <option value="image">Image</option>
        <option value="dutch">Dutch</option>
      </select>
      <span id="pool-label"></span>
      Score: <strong id="game-score">0</strong> / <strong id="game-attempts">0</strong>
    </div>
    <div id="ctx-gallery" class="ctx-panel active">
      <button class="ctx-btn" id="settings-btn" title="Settings">
        <svg class="icon"><use href="icons.svg#icon-settings"/></svg>
      </button>
      <button class="ctx-btn" id="add-word-btn" title="Add word">
        <svg class="icon"><use href="icons.svg#icon-plus"/></svg>
      </button>
      <button class="ctx-btn" id="cols-btn" title="Columns">
        <svg class="icon"><use href="icons.svg#icon-columns"/></svg>
        <span id="cols-label">4</span>
      </button>
    </div>
    <div id="ctx-word" class="ctx-panel">
      <button class="ctx-btn" id="ctx-prev-btn" title="Previous word">
        <svg class="icon"><use href="icons.svg#icon-arrow-left"/></svg>
      </button>
      <button class="ctx-btn" id="ctx-next-btn" title="Next word">
        <svg class="icon"><use href="icons.svg#icon-arrow-right"/></svg>
      </button>
    </div>
  </div>
  <div id="control-row">
    <button id="ui-toggle" title="Toggle UI">
      <svg class="icon icon-lg"><use href="icons.svg#icon-circle-outline"/></svg>
    </button>
    <div id="view-pill">
      <button class="pill-btn" id="pill-game" title="Game mode">
        <svg class="icon icon-lg"><use href="icons.svg#icon-zap"/></svg>
      </button>
      <button class="pill-btn active" id="pill-gallery" title="Gallery">
        <svg class="icon icon-lg"><use href="icons.svg#icon-grid"/></svg>
      </button>
      <button class="pill-btn" id="pill-word" title="Word view">
        <svg class="icon icon-lg"><use href="icons.svg#icon-book"/></svg>
      </button>
    </div>
  </div>
</div>

<!-- Main -->
<main id="main">
  <div id="error-msg">
    Could not load vocabulary. Tap <strong>Sync</strong> to load from the server, or use the app online.
  </div>

  <!-- Gallery -->
  <div id="gallery"></div>

  <!-- Game view -->
  <div id="game-view">
    <div id="quick-add-panel">
      <input id="quick-add-input" type="text" placeholder="New word…" autocomplete="off" spellcheck="false">
      <button id="quick-add-submit">
        <svg class="icon"><use href="icons.svg#icon-plus"/></svg>
      </button>
    </div>
    <div class="game-inner">
      <div class="clue-card">
        <div class="clue-label-row">
          <span id="clue-label">What word fits here?</span>
        </div>
        <div id="clue-text"></div>
        <div class="clue-card-footer">
          <div id="clue-source"></div>
          <div id="clue-solved-actions"></div>
        </div>
      </div>
      <div class="game-choices" id="game-choices"></div>
      <button id="game-next-btn">Skip →</button>
    </div>
  </div>

  <!-- Word view -->
  <div id="word-view">
    <div id="new-word-bar">
      <input id="new-word-input" type="text" placeholder="Enter new word…" autocomplete="off" spellcheck="false">
      <button id="create-word-btn">Create</button>
    </div>
    <div id="main-image-wrap">
      <img id="main-image" src="" alt="">
      <div id="no-image-placeholder">
        <svg class="icon no-image-icon"><use href="icons.svg#icon-image"/></svg>
      </div>
    </div>
    <div id="word-info-panel">
      <div id="word-title-bar">
        <div id="word-title-group">
          <div id="word-title"></div>
          <div id="word-phonetic"></div>
        </div>
        <button id="learnt-btn" class="icon-action-btn" title="Mark as learnt">
          <svg class="icon"><use href="icons.svg#icon-star"/></svg>
        </button>
        <button id="delete-word-btn" class="icon-action-btn delete-btn" title="Delete word">
          <svg class="icon"><use href="icons.svg#icon-trash"/></svg>
        </button>
      </div>
      <div id="def-area">
        <div id="definitions-list"></div>
        <textarea id="def-edit" spellcheck="false" placeholder="No definition…"></textarea>
        <button id="def-more-btn" style="display:none">View more</button>
      </div>
      <div id="word-info-columns">
        <div class="info-col">
          <span class="info-col-label">Dutch</span>
          <input id="trans-edit" type="text" spellcheck="false" placeholder="—">
        </div>
        <div class="info-col">
          <span class="info-col-label">Synonyms</span>
          <input id="syns-edit" type="text" placeholder="—" spellcheck="false">
        </div>
        <div class="info-col">
          <span class="info-col-label">Antonyms</span>
          <input id="ants-edit" type="text" placeholder="—" spellcheck="false">
        </div>
      </div>
      <div id="stats-rows"></div>
    </div>

    <div id="occurrences-section" style="display:none">
      <div id="occurrences-heading">Occurrences</div>
      <div id="occurrences-list"></div>
    </div>
  </div>
</main>

<!-- Lightbox -->
<div id="lightbox"><img id="lightbox-img" src="" alt=""></div>

<!-- Confirm delete modal -->
<div id="confirm-modal">
  <div id="confirm-modal-box">
    <div id="confirm-modal-title">Delete word?</div>
    <div id="confirm-modal-body"></div>
    <div id="confirm-modal-actions">
      <button id="confirm-cancel-btn">Cancel</button>
      <button id="confirm-delete-btn">Delete</button>
    </div>
  </div>
</div>

<!-- Word of the Day modal -->
<div id="wotd-modal">
  <div id="wotd-modal-box">
    <div id="wotd-label">Word of the day</div>
    <div id="wotd-word"></div>
    <div id="wotd-pos"></div>
    <div id="wotd-def"></div>
    <button id="wotd-close-btn">Got it</button>
  </div>
</div>


<!-- Settings modal -->
<div id="settings-modal">
  <div id="settings-modal-box">
    <div id="settings-modal-title">Settings</div>
    <div class="theme-row">
      <span class="theme-row-label">Theme</span>
      <div class="theme-btns">
        <button class="theme-btn" data-theme="dark">Dark</button>
        <button class="theme-btn" data-theme="light">Light</button>
        <button class="theme-btn" data-theme="epaper">E-paper</button>
      </div>
    </div>
    <button class="modal-action" id="sync-btn" title="Reload vocabulary from vocab.json">
      <svg class="icon"><use href="icons.svg#icon-refresh"/></svg> Sync vocabulary
    </button>
    <button class="modal-action" id="export-btn" title="Export vocabulary as JSON">
      <svg class="icon"><use href="icons.svg#icon-download"/></svg> Export vocabulary
    </button>
    <button id="reset-stats-btn">Reset game stats</button>
    <button id="settings-close-btn">Close</button>
  </div>
</div>

<script src="vocab.js"></script>
<script>
// ── PWA-specific: sync + export + settings ────────────────────────────────────
const syncBtn       = document.getElementById('sync-btn');
const exportBtn     = document.getElementById('export-btn');
const settingsBtn   = document.getElementById('settings-btn');
const settingsModal = document.getElementById('settings-modal');
const syncStatus    = document.getElementById('sync-status');
let syncTimer = null;

function showSyncStatus(msg, ok = true) {
  syncStatus.textContent = msg;
  syncStatus.style.color = ok ? 'var(--accent)' : 'var(--red)';
  syncStatus.classList.add('visible');
  clearTimeout(syncTimer);
  syncTimer = setTimeout(() => syncStatus.classList.remove('visible'), 3000);
}

syncBtn.addEventListener('click', async () => {
  syncBtn.disabled = true;
  settingsModal.classList.remove('open');
  try {
    const resp = await fetch('vocab.json', { cache: 'reload' });
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const fresh = await resp.json();
    Object.entries(fresh).forEach(([k, v]) => {
      if (vocab[k]?.stats && !v.stats) v.stats = vocab[k].stats;
    });
    vocab = fresh;
    saveVocabToStorage();
    renderWordList();
    renderGallery();
    showSyncStatus(`✓ Synced ${Object.keys(vocab).length} words`);
  } catch {
    showSyncStatus('Sync failed — vocab.json not found', false);
  }
  syncBtn.disabled = false;
});

exportBtn.addEventListener('click', () => {
  const blob = new Blob([JSON.stringify(vocab, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'vocab_export.json';
  a.click();
  URL.revokeObjectURL(a.href);
  settingsModal.classList.remove('open');
  showSyncStatus('Export downloaded');
});

settingsBtn.addEventListener('click', () => {
  settingsModal.classList.add('open');
});
document.getElementById('settings-close-btn').addEventListener('click', () => {
  settingsModal.classList.remove('open');
});
settingsModal.addEventListener('click', e => {
  if (e.target === settingsModal) settingsModal.classList.remove('open');
});
document.getElementById('reset-stats-btn').addEventListener('click', () => {
  if (!confirm('Reset all game stats?')) return;
  for (const word of Object.keys(vocab)) {
    if (vocab[word].stats) vocab[word].stats = { correct: 0, wrong: 0 };
  }
  saveVocabToStorage();
  settingsModal.classList.remove('open');
  showSyncStatus('Game stats reset');
});

// ── Word of the Day ───────────────────────────────────────────────────────────
const wotdModal    = document.getElementById('wotd-modal');
const wotdWordEl   = document.getElementById('wotd-word');
const wotdPosEl    = document.getElementById('wotd-pos');
const wotdDefEl    = document.getElementById('wotd-def');
const wotdCloseBtn = document.getElementById('wotd-close-btn');
const WOTD_INTERVAL = 60 * 60 * 1000; // 1 hour

function onVocabReady() {
  const last = parseInt(localStorage.getItem('wotd_last') || '0', 10);
  if (Date.now() - last < WOTD_INTERVAL) return;
  const today = new Date().toISOString().slice(0, 10);
  const key   = wotdKeyForDate(today);
  if (!key) return;
  const data  = vocab[key] || {};
  if (wotdWordEl) wotdWordEl.textContent = data.word || key;
  if (wotdPosEl)  wotdPosEl.textContent  = data.part_of_speech || '';
  if (wotdDefEl)  wotdDefEl.textContent  = data.definition || '';
  if (wotdModal)  wotdModal.classList.add('open');
  localStorage.setItem('wotd_last', String(Date.now()));
}

if (wotdCloseBtn) wotdCloseBtn.addEventListener('click', () => wotdModal.classList.remove('open'));
if (wotdModal) wotdModal.addEventListener('click', e => {
  if (e.target === wotdModal) wotdModal.classList.remove('open');
});

// ── Service worker ────────────────────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}

// ── Boot ──────────────────────────────────────────────────────────────────────
loadVocab();
</script>
</body>
</html>
